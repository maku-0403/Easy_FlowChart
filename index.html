<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flowchart Studio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="4" width="7" height="5" rx="1.2"></rect>
              <rect x="14" y="15" width="7" height="5" rx="1.2"></rect>
              <path d="M10 6.5h3.2c2.4 0 3.8 1.3 3.8 3.5v4"></path>
            </svg>
          </span>
          <span>Flowchart Studio</span>
        </div>

        <div class="top-actions" aria-label="Document actions">
          <button id="undoBtn" class="icon-button" type="button" title="Undo" aria-label="Undo">
            <svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"></path><path d="M4 9h10a6 6 0 0 1 0 12h-3"></path></svg>
          </button>
          <button id="redoBtn" class="icon-button" type="button" title="Redo" aria-label="Redo">
            <svg viewBox="0 0 24 24"><path d="m15 14 5-5-5-5"></path><path d="M20 9H10a6 6 0 0 0 0 12h3"></path></svg>
          </button>
          <button id="sampleBtn" class="text-button" type="button" title="Load sample">
            <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4z"></path><path d="M14 4h6v6h-6z"></path><path d="M9 14h6v6H9z"></path><path d="M10 7h4"></path><path d="M17 10v4"></path><path d="M7 10v4h5"></path></svg>
            Sample
          </button>
          <button id="layoutBtn" class="text-button" type="button" title="Auto layout">
            <svg viewBox="0 0 24 24"><path d="M4 5h7v5H4z"></path><path d="M13 14h7v5h-7z"></path><path d="M8 10v2a3 3 0 0 0 3 3h2"></path><path d="M15 8h2a3 3 0 0 1 3 3v3"></path></svg>
            Layout
          </button>
          <button id="exportSvgBtn" class="text-button" type="button" title="Export SVG">
            <svg viewBox="0 0 24 24"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
            SVG
          </button>
          <button id="exportJsonBtn" class="text-button" type="button" title="Export JSON">
            <svg viewBox="0 0 24 24"><path d="M8 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6h-2"></path><path d="M14 3v6h6"></path><path d="M8 13h8"></path><path d="M8 17h5"></path></svg>
            JSON
          </button>
          <button id="exportMermaidBtn" class="text-button" type="button" title="Export Mermaid">
            <svg viewBox="0 0 24 24"><path d="M4 6h6v5H4z"></path><path d="M14 13h6v5h-6z"></path><path d="M10 8.5h2a4 4 0 0 1 4 4v.5"></path><path d="M6 11v2a4 4 0 0 0 4 4h4"></path></svg>
            Mermaid
          </button>
          <label class="text-button file-button" title="Import JSON">
            <svg viewBox="0 0 24 24"><path d="M12 21V9"></path><path d="m7 14 5-5 5 5"></path><path d="M5 3h14"></path></svg>
            Import
            <input id="importInput" type="file" accept="application/json,.json" />
          </label>
          <button id="clearBtn" class="icon-button danger" type="button" title="Clear diagram" aria-label="Clear diagram">
            <svg viewBox="0 0 24 24"><path d="M4 7h16"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M6 7l1 13h10l1-13"></path><path d="M9 7V4h6v3"></path></svg>
          </button>
        </div>
      </header>

      <aside class="tool-panel" aria-label="Flowchart tools">
        <div class="panel-title">Shapes</div>
        <div class="shape-grid">
          <button class="shape-button" type="button" data-add-type="start" title="Add start node">
            <span class="shape-icon pill"></span>
            <span>Start</span>
          </button>
          <button class="shape-button" type="button" data-add-type="process" title="Add process node">
            <span class="shape-icon rect"></span>
            <span>Process</span>
          </button>
          <button class="shape-button" type="button" data-add-type="decision" title="Add decision node">
            <span class="shape-icon diamond"></span>
            <span>Decision</span>
          </button>
          <button class="shape-button" type="button" data-add-type="data" title="Add data node">
            <span class="shape-icon data"></span>
            <span>Data</span>
          </button>
          <button class="shape-button" type="button" data-add-type="end" title="Add end node">
            <span class="shape-icon pill end"></span>
            <span>End</span>
          </button>
        </div>

        <div class="panel-title">Mode</div>
        <div class="segmented-control" role="group" aria-label="Edit mode">
          <button id="moveModeBtn" class="segment active" type="button">Move</button>
          <button id="connectModeBtn" class="segment" type="button">Connect</button>
        </div>

        <div class="panel-title">View</div>
        <label class="field">
          <span>Zoom</span>
          <input id="zoomRange" type="range" min="60" max="160" step="10" value="100" />
        </label>
        <button id="fitBtn" class="wide-button" type="button" title="Fit canvas">
          <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M16 3h3a2 2 0 0 1 2 2v3"></path><path d="M8 21H5a2 2 0 0 1-2-2v-3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>
          Fit
        </button>
      </aside>

      <main class="canvas-panel">
        <div class="canvas-toolbar">
          <div id="statusText" class="status-text">Ready</div>
          <button id="deleteBtn" class="icon-button danger" type="button" title="Delete selected" aria-label="Delete selected">
            <svg viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="m9 11 .5 7"></path><path d="m15 11-.5 7"></path><path d="M6 6l1 15h10l1-15"></path></svg>
          </button>
        </div>
        <div class="canvas-wrap">
          <svg id="flowSvg" class="flow-canvas" viewBox="0 0 1600 1000" role="img" aria-label="Flowchart canvas">
            <defs>
              <pattern id="gridPattern" width="24" height="24" patternUnits="userSpaceOnUse">
                <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#d9e1ea" stroke-width="1"></path>
              </pattern>
              <marker id="arrowMarker" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3a48"></path>
              </marker>
            </defs>
            <rect class="canvas-bg" x="0" y="0" width="1600" height="1000" fill="url(#gridPattern)"></rect>
            <g id="edgeLayer"></g>
            <g id="nodeLayer"></g>
          </svg>
        </div>
      </main>

      <aside class="inspector-panel" aria-label="Inspector">
        <div class="panel-title">Inspector</div>
        <div id="inspectorContent"></div>
      </aside>
    </div>

    <script src="app.js"></script>
  </body>
</html>
